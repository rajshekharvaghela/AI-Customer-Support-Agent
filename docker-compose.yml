version: '3.8'

services:
  # Backend FastAPI Service
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: refund_agent_backend
    ports:
      - "8000:8000"
    environment:
      - FASTAPI_HOST=0.0.0.0
      - FASTAPI_PORT=8000
      - LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - DEBUG=True
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    depends_on:
      - ollama
    command: python -m backend.main
    networks:
      - refund_network

  # Frontend Streamlit Service
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: refund_agent_frontend
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_PORT=8501
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      - backend
    command: streamlit run frontend/app.py
    networks:
      - refund_network

  # Ollama LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: refund_agent_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    networks:
      - refund_network

networks:
  refund_network:
    driver: bridge

volumes:
  ollama_data: